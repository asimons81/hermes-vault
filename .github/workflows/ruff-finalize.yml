# Triggered after temporary runner validation.
# Retried after the runner reached master.
name: One-shot Ruff cleanup finalizer

on:
  push:
    branches:
      - chore/ruff-cleanup

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v7
        with:
          ref: chore/ruff-cleanup
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Merge current master
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git merge --no-edit origin/master

      - name: Install Ruff
        run: python -m pip install ruff==0.15.22

      - name: Apply reviewed remaining Pyflakes fixes
        run: ruff check . --select F --fix --unsafe-fixes

      - name: Enable the full Pyflakes gate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          text = text.replace(
              "# Start with fatal correctness classes as the blocking baseline. The full\n"
              "# Pyflakes report is preserved as an advisory CI artifact for cleanup.\n"
              "select = [\"E9\", \"F63\", \"F7\", \"F82\"]",
              "# Block syntax failures and the full Pyflakes correctness family.\n"
              "# Style-only rules remain out of scope until adopted intentionally.\n"
              "select = [\"E9\", \"F\"]",
          )
          pyproject.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/ci.yml")
          text = workflow.read_text(encoding="utf-8")
          old = '''      - name: Run blocking Ruff checks
        shell: bash
        run: ruff check . --output-format=concise | tee ruff-blocking-report.txt

      - name: Run full Ruff baseline
        if: always()
        continue-on-error: true
        shell: bash
        run: ruff check . --select F --output-format=concise | tee ruff-advisory-report.txt
'''
          new = '''      - name: Run Ruff checks
        shell: bash
        run: ruff check . --output-format=concise | tee ruff-report.txt
'''
          if old not in text:
              raise SystemExit("expected Ruff CI block not found")
          text = text.replace(old, new, 1)
          text = text.replace(
              "            ruff-blocking-report.txt\n            ruff-advisory-report.txt\n            mypy-report.txt",
              "            ruff-report.txt\n            mypy-report.txt",
              1,
          )
          workflow.write_text(text, encoding="utf-8")
          PY

      - name: Verify full Ruff gate
        run: ruff check . --output-format=concise

      - name: Remove one-shot workflow and commit
        shell: bash
        run: |
          rm .github/workflows/ruff-finalize.yml
          git diff --check
          git add -A
          git commit -m "chore: eliminate Ruff advisory baseline"
          git push origin HEAD:chore/ruff-cleanup
