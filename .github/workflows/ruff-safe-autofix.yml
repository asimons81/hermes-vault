name: One-shot Ruff safe autofix

on:
  push:
    branches:
      - chore/ruff-cleanup

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: chore/ruff-cleanup
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: python -m pip install ruff==0.15.22

      - name: Apply Ruff safe fixes
        run: ruff check . --select F --fix --exit-zero

      - name: Remove one-shot workflow and commit
        shell: bash
        run: |
          rm .github/workflows/ruff-safe-autofix.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply safe Ruff fixes"
          git push origin HEAD:chore/ruff-cleanup
